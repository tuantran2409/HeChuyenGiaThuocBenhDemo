version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hcgtb-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "HcGtb@2024!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'HcGtb@2024!' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  sqlserver_data:
